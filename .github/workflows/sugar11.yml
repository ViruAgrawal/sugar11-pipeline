name: Sugar #11 and CADUSD Futures Pipeline

on:
  schedule:
    - cron: "0 11 * * 1-5"
  workflow_dispatch:

concurrency:
  group: sugar11-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # IMPORTANT: needed for rebasing

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas yfinance

      # ✅ PULL FIRST (working tree clean)
      - name: Sync with remote
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git pull --rebase origin main

      # ✅ THEN generate files
      - name: Run Sugar #11 pipeline
        run: |
          python sugar11_pipeline.py
          python cadusd_pipeline.py

      # ✅ THEN commit & push
      - name: Commit updated CSVs
        run: |
          git add sb_continuous.csv sb_forward.csv sb_meta.csv cadusd_spot.csv cadusd_forwards.csv cadusd_meta.csv
          git commit -m "Auto-update Sugar11 data [skip ci]" || echo "No changes to commit"
          git push origin main
